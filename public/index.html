<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mediation — Live Coordination</title>
<link rel="icon" href="/public/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --abyss: #060b14;
    --deep: #0a1220;
    --panel: #0d1626;
    --panel-edge: #16233c;
    --ink: #dce8f5;
    --ink-dim: #6d829e;
    --ink-faint: #3d4f68;
    --teal: #2dd4bf;
    --cyan: #38bdf8;
    --amber: #fbbf24;
    --rose: #fb7185;
    --violet: #a78bfa;
    --green: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scrollbar-color: var(--panel-edge) var(--abyss); }
  body {
    background: var(--abyss);
    color: var(--ink);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.55;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(45, 212, 191, 0.07), transparent),
      radial-gradient(ellipse 60% 40% at 85% 110%, rgba(56, 189, 248, 0.05), transparent);
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 26px 36px 22px;
    border-bottom: 1px solid var(--panel-edge);
    position: sticky;
    top: 0;
    background: rgba(6, 11, 20, 0.88);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .logo-wrap { position: relative; width: 52px; height: 52px; flex: none; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 14px rgba(45, 212, 191, 0.35)); }
  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(45, 212, 191, 0.18);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.12); opacity: 0.15; }
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.5px;
    background: linear-gradient(120deg, var(--teal), var(--cyan) 70%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline { color: var(--ink-dim); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .project-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 8px;
    padding: 7px 12px;
  }
  .project-picker label { color: var(--ink-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .project-picker input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--teal);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    width: 160px;
  }
  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--ink-dim);
    font-size: 11px;
  }
  .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: 0.35; } }
  .live-dot.stale::before { background: var(--rose); box-shadow: 0 0 8px var(--rose); }

  /* ---------- layout ---------- */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
    padding: 24px 36px 60px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .span-2 { grid-column: span 2; }
  .span-3 { grid-column: span 3; }

  section {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 12px;
    padding: 18px 20px;
    animation: rise 0.5s ease backwards;
  }
  section:nth-child(2) { animation-delay: 0.06s; }
  section:nth-child(3) { animation-delay: 0.12s; }
  section:nth-child(4) { animation-delay: 0.18s; }
  section:nth-child(5) { animation-delay: 0.24s; }
  section:nth-child(6) { animation-delay: 0.3s; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }

  h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }
  h2 .count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-faint); font-weight: 400; }
  h2 .glyph { font-style: normal; }

  .empty { color: var(--ink-faint); font-style: italic; padding: 6px 0; }

  /* ---------- sessions ---------- */
  .session {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--deep);
    border: 1px solid transparent;
    margin-bottom: 8px;
  }
  .session:hover { border-color: var(--panel-edge); }
  .avatar {
    width: 34px; height: 34px;
    flex: none;
    border-radius: 9px;
    display: grid;
    place-items: center;
    font-weight: 600;
    font-size: 14px;
    color: var(--abyss);
    background: linear-gradient(135deg, var(--teal), var(--cyan));
  }
  .session:nth-child(odd) .avatar { background: linear-gradient(135deg, var(--violet), var(--cyan)); }
  .session .who { flex: 1; min-width: 0; }
  .session .agent-name { font-weight: 600; }
  .session .meta { color: var(--ink-dim); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session .seen { color: var(--ink-faint); font-size: 10px; text-align: right; }

  /* ---------- claims ---------- */
  .claim {
    background: var(--deep);
    border: 1px solid var(--panel-edge);
    border-left: 3px solid var(--cyan);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .claim[data-status="investigating"] { border-left-color: var(--violet); }
  .claim[data-status="in-progress"] { border-left-color: var(--cyan); }
  .claim[data-status="testing"] { border-left-color: var(--amber); }
  .claim[data-status="blocked"] { border-left-color: var(--rose); }
  .claim-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .claim-intent { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 200px; }
  .badge {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
  }
  .badge.investigating { color: var(--violet); border-color: rgba(167, 139, 250, 0.4); }
  .badge.in-progress { color: var(--cyan); border-color: rgba(56, 189, 248, 0.4); }
  .badge.testing { color: var(--amber); border-color: rgba(251, 191, 36, 0.4); }
  .badge.blocked { color: var(--rose); border-color: rgba(251, 113, 133, 0.4); }
  .badge.done { color: var(--green); border-color: rgba(52, 211, 153, 0.4); }
  .claim-sub { color: var(--ink-dim); font-size: 11px; margin-top: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .chip {
    font-size: 10.5px;
    background: rgba(45, 212, 191, 0.08);
    color: var(--teal);
    border: 1px solid rgba(45, 212, 191, 0.2);
    padding: 2px 8px;
    border-radius: 5px;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip.component { background: rgba(167, 139, 250, 0.08); color: var(--violet); border-color: rgba(167, 139, 250, 0.2); }
  .chip.commit { background: rgba(52, 211, 153, 0.08); color: var(--green); border-color: rgba(52, 211, 153, 0.25); }
  .findings { margin-top: 8px; padding-left: 12px; border-left: 1px dashed var(--panel-edge); }
  .findings li { list-style: none; color: var(--ink-dim); font-size: 11.5px; padding: 2px 0; }
  .findings li::before { content: '◈ '; color: var(--teal); }
  .claim-conflict-note {
    margin-top: 8px;
    font-size: 11px;
    color: var(--amber);
    background: rgba(251, 191, 36, 0.07);
    border: 1px solid rgba(251, 191, 36, 0.2);
    padding: 5px 9px;
    border-radius: 6px;
  }

  /* ---------- conflicts ---------- */
  .conflict-card {
    border: 1px solid rgba(251, 191, 36, 0.35);
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.06), transparent);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .conflict-card .vs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12.5px; }
  .conflict-card .vs b { color: var(--amber); }
  .conflict-card .reason { color: var(--ink-dim); font-size: 11px; margin-top: 5px; }
  .conflict-card .reason code { color: var(--amber); font-size: 10.5px; }

  /* ---------- bugs ---------- */
  .bug {
    display: flex;
    gap: 10px;
    padding: 9px 12px;
    background: var(--deep);
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 3px solid var(--rose);
    align-items: baseline;
  }
  .bug[data-status="claimed"] { border-left-color: var(--amber); }
  .bug[data-status="fixed"] { border-left-color: var(--green); opacity: 0.65; }
  .bug .title { font-size: 12.5px; flex: 1; }
  .bug .title small { display: block; color: var(--ink-dim); font-size: 10.5px; margin-top: 2px; }
  .sev { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--rose); }

  /* ---------- files ---------- */
  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(22, 35, 60, 0.6);
    font-size: 12px;
  }
  .file-row:last-child { border-bottom: none; }
  .file-row .path { color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row .who { color: var(--teal); font-size: 10.5px; }
  .file-row.hot .path { color: var(--amber); }
  .file-row.hot .who { color: var(--amber); font-weight: 600; }

  /* ---------- feed ---------- */
  .feed { max-height: 340px; overflow-y: auto; }
  .event { display: flex; gap: 10px; padding: 5px 2px; font-size: 11.5px; color: var(--ink-dim); align-items: baseline; }
  .event .t { color: var(--ink-faint); font-size: 10px; flex: none; width: 58px; }
  .event .k { flex: none; width: 74px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }
  .event .k.session { color: var(--cyan); }
  .event .k.claim { color: var(--teal); }
  .event .k.finding { color: var(--violet); }
  .event .k.bug { color: var(--rose); }
  .event .k.completed { color: var(--green); }
  .event .k.activity { color: var(--ink-faint); }

  footer {
    text-align: center;
    color: var(--ink-faint);
    font-size: 10.5px;
    padding: 20px 0 34px;
    letter-spacing: 0.08em;
  }

  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr 1fr; }
    .span-2, .span-3 { grid-column: span 2; }
  }
  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; padding: 16px; }
    .span-2, .span-3 { grid-column: span 1; }
    header { padding: 18px 16px; flex-wrap: wrap; }
    .header-right { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>
  <header>
    <div class="logo-wrap"><img src="/public/logo.png" alt="Mediation logo" /></div>
    <div>
      <h1>Mediation</h1>
      <div class="tagline">Live coordination — before Git makes it visible</div>
    </div>
    <div class="header-right">
      <span class="live-dot" id="liveDot">live</span>
      <div class="project-picker">
        <label>project</label>
        <input id="projectInput" value="demo" spellcheck="false" />
      </div>
    </div>
  </header>

  <main>
    <section class="span-1">
      <h2><span class="glyph">◉</span> Active Sessions <span class="count" id="sessionCount"></span></h2>
      <div id="sessions"></div>
    </section>

    <section class="span-2">
      <h2><span class="glyph">◈</span> Work Claims <span class="count" id="claimCount"></span></h2>
      <div id="claims"></div>
    </section>

    <section class="span-2">
      <h2><span class="glyph">⚠</span> Possible Conflicts <span class="count" id="conflictCount"></span></h2>
      <div id="conflicts"></div>
    </section>

    <section class="span-1">
      <h2><span class="glyph">✦</span> Recently Touched Files</h2>
      <div id="files"></div>
    </section>

    <section class="span-1">
      <h2><span class="glyph">◬</span> Bugs &amp; Observations <span class="count" id="bugCount"></span></h2>
      <div id="bugs"></div>
    </section>

    <section class="span-1">
      <h2><span class="glyph">✓</span> Completed Work</h2>
      <div id="completed"></div>
    </section>

    <section class="span-1">
      <h2><span class="glyph">≋</span> Activity</h2>
      <div id="feed" class="feed"></div>
    </section>
  </main>

  <footer>mediation · conflicts are warnings, not locks · coordinate early</footer>

<script>
  const params = new URLSearchParams(location.search);
  const projectInput = document.getElementById('projectInput');
  projectInput.value = params.get('project') || 'demo';
  projectInput.addEventListener('change', () => {
    params.set('project', projectInput.value.trim() || 'demo');
    location.search = params.toString();
  });

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const ago = (ts) => {
    const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
    if (s < 5) return 'now';
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    return Math.floor(s / 3600) + 'h';
  };
  const clock = (ts) => new Date(ts).toTimeString().slice(0, 8);
  const empty = (msg) => `<div class="empty">${msg}</div>`;

  function renderSessions(sessions) {
    document.getElementById('sessionCount').textContent = sessions.length ? `(${sessions.length})` : '';
    const el = document.getElementById('sessions');
    if (!sessions.length) return (el.innerHTML = empty('No active sessions. Agents appear here when they connect.'));
    el.innerHTML = sessions.map((s) => `
      <div class="session">
        <div class="avatar">${esc((s.agent || '?')[0].toUpperCase())}</div>
        <div class="who">
          <div class="agent-name">${esc(s.agent)}</div>
          <div class="meta">
            ${s.developer ? esc(s.developer) + ' · ' : ''}${s.machine ? esc(s.machine) + ' · ' : ''}
            ${s.repo?.branch ? '⎇ ' + esc(s.repo.branch) + (s.repo.dirtyFiles?.length ? ` (+${s.repo.dirtyFiles.length} dirty)` : '') : 'repo not reported'}
          </div>
        </div>
        <div class="seen">${ago(s.lastSeenAt)} ago</div>
      </div>`).join('');
  }

  function claimConflicts(state, claimId) {
    return state.conflicts.filter((c) => c.between.some((b) => b.claimId === claimId));
  }

  function renderClaims(state) {
    const claims = state.claims;
    document.getElementById('claimCount').textContent = claims.length ? `(${claims.length})` : '';
    const el = document.getElementById('claims');
    if (!claims.length) return (el.innerHTML = empty('No active work claims. This is the visibility gap Mediation closes.'));
    el.innerHTML = claims.map((c) => {
      const conflicts = claimConflicts(state, c.id);
      return `
      <div class="claim" data-status="${esc(c.status)}">
        <div class="claim-head">
          <span class="claim-intent">${esc(c.intent)}</span>
          <span class="badge ${esc(c.status)}">${esc(c.status)}</span>
        </div>
        <div class="claim-sub">
          ${esc(c.agent)}${c.developer ? ' for ' + esc(c.developer) : ''}
          ${c.branch ? ' · ⎇ ' + esc(c.branch) : ''}${c.baseRevision ? ' @ ' + esc(String(c.baseRevision).slice(0, 10)) : ''}
          · updated ${ago(c.updatedAt)} ago
        </div>
        ${c.task ? `<div class="claim-sub">task: ${esc(c.task)}</div>` : ''}
        <div class="chips">
          ${(c.files || []).map((f) => `<span class="chip" title="${esc(f)}">📄 ${esc(f)}</span>`).join('')}
          ${(c.components || []).map((f) => `<span class="chip component">▣ ${esc(f)}</span>`).join('')}
        </div>
        ${(c.findings || []).length ? `<ul class="findings">${c.findings.map((f) => `<li>${esc(f.text)}</li>`).join('')}</ul>` : ''}
        ${conflicts.length ? `<div class="claim-conflict-note">⚠ overlaps with ${conflicts.map((k) => esc(k.between.find((b) => b.claimId !== c.id)?.agent || '?')).join(', ')}</div>` : ''}
      </div>`;
    }).join('');
  }

  function renderConflicts(conflicts) {
    document.getElementById('conflictCount').textContent = conflicts.length ? `(${conflicts.length})` : '';
    const el = document.getElementById('conflicts');
    if (!conflicts.length) return (el.innerHTML = empty('No overlapping work detected. All clear.'));
    el.innerHTML = conflicts.map((c) => {
      const reasons = c.reasons.map((r) => {
        if (r.type === 'files') return 'files: ' + r.detail.map((d) => `<code>${esc(d.mine)}</code> ↔ <code>${esc(d.theirs)}</code>`).join(', ');
        if (r.type === 'components') return 'components: ' + r.detail.map((d) => `<code>${esc(d)}</code>`).join(', ');
        return 'similar task (' + r.detail.map((d) => `<code>${esc(d)}</code>`).join(', ') + ')';
      }).join(' · ');
      return `
      <div class="conflict-card">
        <div class="vs"><b>${esc(c.between[0].agent)}</b> ${esc(c.between[0].intent)} <span style="color:var(--ink-faint)">⟷</span> <b>${esc(c.between[1].agent)}</b> ${esc(c.between[1].intent)}</div>
        <div class="reason">${reasons}</div>
      </div>`;
    }).join('');
  }

  function renderFiles(files) {
    const el = document.getElementById('files');
    if (!files.length) return (el.innerHTML = empty('No file activity reported yet.'));
    el.innerHTML = files.slice(0, 18).map((f) => `
      <div class="file-row ${f.agents.length > 1 ? 'hot' : ''}">
        <span class="path" title="${esc(f.file)}">${esc(f.file)}</span>
        <span class="who">${f.agents.map(esc).join(' + ')}</span>
      </div>`).join('');
  }

  function renderBugs(bugs) {
    document.getElementById('bugCount').textContent = bugs.length ? `(${bugs.length})` : '';
    const el = document.getElementById('bugs');
    if (!bugs.length) return (el.innerHTML = empty('No bugs reported. Agents can file discoveries here.'));
    el.innerHTML = bugs.map((b) => `
      <div class="bug" data-status="${esc(b.status)}">
        <div class="title">
          ${esc(b.title)}
          <small>${esc(b.reporter)} · ${ago(b.createdAt)} ago · ${esc(b.status)}${b.files?.length ? ' · ' + b.files.map(esc).join(', ') : ''}</small>
        </div>
        <span class="sev">${esc(b.severity)}</span>
      </div>`).join('');
  }

  function renderCompleted(done) {
    const el = document.getElementById('completed');
    if (!done.length) return (el.innerHTML = empty('Nothing completed yet.'));
    el.innerHTML = done.slice(0, 8).map((c) => `
      <div class="claim" data-status="done">
        <div class="claim-head"><span class="claim-intent">${esc(c.intent)}</span><span class="badge done">done</span></div>
        <div class="claim-sub">${esc(c.agent)} · ${ago(c.completedAt)} ago${c.summary ? ' · ' + esc(c.summary) : ''}</div>
        <div class="chips">
          ${(c.commits || []).map((k) => `<span class="chip commit">⌥ ${esc(k)}</span>`).join('')}
          ${(c.prs || []).map((k) => `<span class="chip commit">⤴ ${esc(k)}</span>`).join('')}
        </div>
      </div>`).join('');
  }

  function renderFeed(events) {
    const el = document.getElementById('feed');
    if (!events.length) return (el.innerHTML = empty('No activity yet.'));
    el.innerHTML = events.map((e) => `
      <div class="event">
        <span class="t">${clock(e.at)}</span>
        <span class="k ${esc(e.type)}">${esc(e.type)}</span>
        <span>${esc(e.message)}</span>
      </div>`).join('');
  }

  let failed = 0;
  async function poll() {
    const project = encodeURIComponent(projectInput.value.trim() || 'demo');
    try {
      const res = await fetch(`/api/projects/${project}/state`);
      if (!res.ok) throw new Error(res.status);
      const state = await res.json();
      failed = 0;
      document.getElementById('liveDot').classList.remove('stale');
      renderSessions(state.sessions);
      renderClaims(state);
      renderConflicts(state.conflicts);
      renderFiles(state.recentFiles);
      renderBugs(state.bugs);
      renderCompleted(state.completed);
      renderFeed(state.events);
    } catch {
      if (++failed > 2) document.getElementById('liveDot').classList.add('stale');
    }
  }
  poll();
  setInterval(poll, 3000);
</script>
</body>
</html>
